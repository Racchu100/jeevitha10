<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <meta name="description" content="A special surprise birthday website created with love.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            /* Theme: Pink-Purple (Default) */
            --bg-gradient: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            --accent-primary: #ff69b4;
            --accent-secondary: #9b59b6;
            --text-main: #2d3436;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.3);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        [data-theme="gold-coral"] {
            --bg-gradient: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            --accent-primary: #ff7f50;
            --accent-secondary: #ffd700;
        }

        [data-theme="blue-silver"] {
            --bg-gradient: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            --accent-primary: #3498db;
            --accent-secondary: #bdc3c7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-main);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Cursor Trail */
        .cursor-trail {
            position: fixed;
            width: 8px;
            height: 8px;
            background: var(--accent-primary);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease-out, opacity 0.3s ease-out;
            opacity: 0.6;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes rotateGift {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
            100% { transform: rotate(0deg); }
        }

        @keyframes dance {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(2px, -2px) rotate(1deg); }
            50% { transform: translate(-2px, 2px) rotate(-1deg); }
            75% { transform: translate(2px, 2px) rotate(1deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        /* Sections */
        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            text-align: center;
        }

        /* Surprise Box Section */
        #hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease, visibility 0.8s;
            position: relative;
        }

        .gift-box {
            font-size: 100px;
            cursor: pointer;
            animation: rotateGift 0.5s infinite ease-in-out;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s;
            user-select: none;
        }

        .gift-box:hover {
            transform: scale(1.2);
        }

        .tap-text {
            margin-top: 30px;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeIn 1s infinite alternate;
        }

        /* Main Content */
        #content {
            display: none;
            opacity: 0;
            padding-bottom: 120px;
        }

        .profile-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            padding: 50px 20px;
            margin-top: 40px;
            box-shadow: var(--shadow);
            animation: fadeIn 1s ease-out forwards;
        }

        .profile-img-container {
            width: 160px;
            height: 160px;
            margin: 0 auto 25px;
            border-radius: 50%;
            padding: 6px;
            background: linear-gradient(45deg, var(--accent-primary), var(--accent-secondary));
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid white;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin-bottom: 15px;
            line-height: 1.1;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.2rem;
            font-weight: 500;
            opacity: 0.8;
            margin-bottom: 40px;
        }

        /* Photo Gallery */
        .gallery {
            margin-top: 50px;
            display: grid;
            gap: 40px;
        }

        .photo-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
            transform: translateY(50px);
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .photo-card.reveal {
            transform: translateY(0);
            opacity: 1;
        }

        .photo-card img {
            width: 100%;
            height: 450px;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .photo-card:hover img {
            transform: scale(1.05);
        }

        .quote-box {
            padding: 30px;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #333;
            background: white;
            border-top: 1px solid #eee;
        }

        /* Final Message */
        .final-card {
            margin-top: 80px;
            padding: 50px 40px;
            background: white;
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .love-section {
            margin-top: 50px;
            padding: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            text-align: center;
        }

        .love-section h2 {
            font-family: 'Playfair Display', serif;
            margin-bottom: 30px;
            color: var(--accent-primary);
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            height: 60px;
            position: relative;
        }

        .love-btn {
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .yes-btn {
            background: var(--accent-primary);
            color: white;
        }

        .yes-btn:hover {
            transform: scale(1.1);
            background: #ff1493;
        }

        .no-btn {
            background: #eee;
            color: #666;
            position: relative; /* Change from absolute to relative for initial layout */
            transition: all 0.2s ease;
            animation: dance 0.2s infinite;
        }

        .love-response {
            margin-top: 20px;
            font-weight: 700;
            color: var(--accent-primary);
            font-size: 1.2rem;
            min-height: 1.5em;
        }

        .final-card::before {
            content: "♥";
            position: absolute;
            top: -20px;
            right: 20px;
            font-size: 80px;
            opacity: 0.05;
            color: var(--accent-primary);
        }

        .final-message {
            font-size: 1.3rem;
            line-height: 2;
            color: #444;
            margin-bottom: 30px;
            text-align: justify;
        }

        .signature {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent-primary);
            text-align: right;
        }

        /* Floating Buttons */
        .fab-container {
            position: fixed;
            bottom: 25px;
            right: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 1000;
        }

        .fab {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: white;
            border: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.3s ease;
        }

        .fab:hover {
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }

        /* Floating elements */
        .balloon {
            position: fixed;
            font-size: 40px;
            z-index: -1;
            user-select: none;
            pointer-events: none;
        }

        /* Responsive adjustments */
        @media (max-width: 375px) {
            h1 { font-size: 2.2rem; }
            .profile-img-container { width: 140px; height: 140px; }
            .photo-card img { height: 409px; }
            .final-card { padding: 35px 25px; }
        }
    </style>
</head>
<body>

    <div id="cursorTrail"></div>

    <div id="hero" class="container">
        <div class="gift-box" id="giftBox" onclick="revealSurprise()">🎁</div>
        <p class="tap-text">Open your gift, Jeevi My Love ❤️!</p>
    </div>

    <div id="content" class="container">
        <div class="profile-card">
            <div class="profile-img-container">
                <img src="" alt="Jeevi My Love ❤️" class="profile-img" id="mainFace">
            </div>
            <h1 id="nameDisplay">Happy Birthday!</h1>
            <p class="subtitle" id="senderDisplay"></p>
        </div>

        <div class="gallery" id="photoGallery"></div>

        <div class="final-card">
            <p class="final-message" id="finalMessageDisplay"></p>
            <p class="signature" id="signatureDisplay"></p>
        </div>

        <!-- Interactive Love Section -->
        <div class="love-section">
            <h2>Do you love me? ❤️</h2>
            <div class="btn-group">
                <button class="love-btn yes-btn" onclick="sayYes()">Yes! 🥰</button>
                <button class="love-btn no-btn" id="noBtn" onmouseover="moveButton()" onclick="moveButton()">No 😢</button>
            </div>
            <p id="loveResponse" class="love-response"></p>
        </div>
    </div>

    <div class="fab-container">
        <button class="fab" id="shareBtn" onclick="shareWebsite()">🔗</button>
        <button class="fab" id="musicToggle" onclick="toggleMusic()">🎵</button>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        const CONFIG = {
            birthdayPersonName: "Jeevi My Love ❤️",
            senderName: "Rakshith",
            facePhotoUrl: "338a5e09-bf5f-4083-9589-17730da15a65.jpg", 
            finalMessage: "To the most amazing person... Jeevi My Love ❤️, you are a bundle of joy and inspiration. Your presence makes everything better. Wishing you a year filled with success, happiness, and all the love you deserve!",
            photos: [
                { url: "acf76634-2815-43fe-9944-a2e39a0ec410.jpg", quote: "You are the most beautiful person I know, inside and out. ❤️" },
                { url: "04ad6445-b091-4b2c-b246-833344c29879.jpg", quote: "Every moment with you is a treasure." },
                { url: "1c0eb733-cdcd-4859-8fb3-813af18d3dbe.jpg", quote: "Your smile lights up my world." },
                { url: "338a5e09-bf5f-4083-9589-17730da15a65.jpg", quote: "Cheers to another year of wonderful memories together." },
                { url: "40a40f1a-2449-482a-bcec-d4c369575e81.jpg", quote: "You make life so much more beautiful." },
                { url: "4c98dcc0-7449-47b6-ab59-94808beec496.jpg", quote: "I am so lucky to have you in my life." },
                { url: "4f9869b2-1970-4c76-a339-5c49996ce428.jpg", quote: "You're my favorite person in the whole world." },
                { url: "5add6565-68bf-4095-8ced-315339cc5d8f.jpg", quote: "Wishing you a day as spectacular as you are." },
                { url: "696573ad-a35e-4018-8ffa-3acb000e4bd8.jpg", quote: "To the moon and back, I love you." },
                { url: "9d607eb9-5334-4ff9-a7d6-83bcab448f1c.jpg", quote: "Every day with you is a gift." },
                { url: "aa8ccf89-f028-41e0-bf20-3693f6d2e542.jpg", quote: "You're the sparkle in my eye." },
                { url: "b3d235bb-6bfe-4087-ab58-4881c7ca9057.jpg", quote: "Forever grateful for your love." },
                { url: "c465e6d6-61a4-404a-9ef8-90dac611c953.jpg", quote: "You're simply the best." },
                { url: "c4c68455-bc0e-484d-b4cb-bebfd63400dd.jpg", quote: "I love your spirit and your soul." },
                { url: "c81a58fe-524d-4d6e-90bf-8303c872c457.jpg", quote: "Thank you for being you." },
                { url: "d62852d8-a580-4806-b523-6d751f8e2c8b.jpg", quote: "You're my everything." },
                { url: "e671e638-cfa8-42f4-9b7c-18422cd8f83c.jpg", quote: "You deserve all the happiness today." },
                { url: "f68426c5-3b90-4ec3-aa2a-62f717324d81.jpg", quote: "May your year be filled with laughter." },
                { url: "fd97e69a-1630-445e-ada9-1a20f4c56eb3.jpg", quote: "I love you more with every passing day." },
                { url: "cake.png", quote: "A sweet treat for the sweetest person. Happy Birthday!" },
                { url: "flowers.png", quote: "Like these roses, you are precious and rare." }
            ],
            confettiColors: ["#ff69b4", "#ffd700", "#9b59b6", "#ff6b6b", "#ffffff"],
            theme: "pink-purple"
        };

        document.body.setAttribute('data-theme', CONFIG.theme);
        document.getElementById('nameDisplay').innerText = `Happy Birthday, ${CONFIG.birthdayPersonName}!`;
        document.getElementById('senderDisplay').innerText = `From ${CONFIG.senderName} with Love`;
        document.getElementById('finalMessageDisplay').innerText = CONFIG.finalMessage;
        document.getElementById('signatureDisplay').innerText = `Forever, ${CONFIG.senderName}`;
        document.getElementById('mainFace').src = CONFIG.facePhotoUrl;

        const gallery = document.getElementById('photoGallery');
        CONFIG.photos.forEach((photo, index) => {
            const card = document.createElement('div');
            card.className = 'photo-card';
            card.innerHTML = `
                <img src="${photo.url}" alt="Memory ${index + 1}" loading="lazy" onerror="this.src='https://picsum.photos/600/800?random=${index}'">
                <div class="quote-box">${photo.quote}</div>
            `;
            gallery.appendChild(card);
        });

        const dots = [];
        const mouse = { x: 0, y: 0 };
        for (let i = 0; i < 15; i++) {
            const dot = document.createElement('div');
            dot.className = 'cursor-trail';
            document.body.appendChild(dot);
            dots.push(dot);
        }

        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        function animateDots() {
            let x = mouse.x;
            let y = mouse.y;
            dots.forEach((dot, index) => {
                dot.style.left = x + 'px';
                dot.style.top = y + 'px';
                dot.style.transform = `scale(${(dots.length - index) / dots.length})`;
                const nextDot = dots[index + 1] || dots[0];
                x += (nextDot.offsetLeft - x) * 0.3;
                y += (nextDot.offsetTop - y) * 0.3;
            });
            requestAnimationFrame(animateDots);
        }
        animateDots();

        function revealSurprise() {
            const hero = document.getElementById('hero');
            const content = document.getElementById('content');
            const gift = document.getElementById('giftBox');

            const duration = 5 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({ particleCount: 7, angle: 60, spread: 60, origin: { x: 0, y: 0.6 }, colors: CONFIG.confettiColors });
                confetti({ particleCount: 7, angle: 120, spread: 60, origin: { x: 1, y: 0.6 }, colors: CONFIG.confettiColors });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());

            gift.style.transform = "scale(8) rotate(45deg)";
            gift.style.opacity = "0";
            
            setTimeout(() => {
                hero.style.display = "none";
                content.style.display = "block";
                setTimeout(() => {
                    content.style.opacity = "1";
                    startFloatingElements();
                    checkScroll();
                }, 50);
            }, 500);

            toggleMusic(true);
        }

        function startFloatingElements() {
            const emojis = ['🎈', '✨', '💖', '🎂', '🥳', '🌸', '🎁'];
            setInterval(() => {
                const balloon = document.createElement('div');
                balloon.className = 'balloon';
                balloon.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                balloon.style.left = Math.random() * 100 + 'vw';
                balloon.style.bottom = '-60px';
                balloon.style.opacity = Math.random() * 0.5 + 0.5;
                balloon.style.transition = `all ${Math.random() * 5 + 5}s linear`;
                document.body.appendChild(balloon);
                setTimeout(() => {
                    balloon.style.bottom = '110vh';
                    balloon.style.transform = `translateX(${Math.random() * 150 - 75}px) rotate(${Math.random() * 360}deg)`;
                }, 100);
                setTimeout(() => balloon.remove(), 10000);
            }, 600);
        }

        function checkScroll() {
            const cards = document.querySelectorAll('.photo-card');
            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                if (rect.top < window.innerHeight * 0.9) card.classList.add('reveal');
            });
        }
        window.addEventListener('scroll', checkScroll);

        let isMusicPlaying = false;
        function toggleMusic(forcePlay = false) {
            const audio = document.getElementById('bgMusic');
            const btn = document.getElementById('musicToggle');
            if (forcePlay || !isMusicPlaying) {
                audio.play().then(() => {
                    isMusicPlaying = true;
                    btn.innerText = "⏸️";
                }).catch(e => console.log("Autoplay blocked"));
            } else {
                audio.pause();
                isMusicPlaying = false;
                btn.innerText = "🎵";
            }
        }

        function shareWebsite() {
            if (navigator.share) {
                navigator.share({
                    title: `Happy Birthday ${CONFIG.birthdayPersonName}!`,
                    text: `Check out this special surprise for ${CONFIG.birthdayPersonName}`,
                    url: window.location.href
                });
            } else {
                alert("URL Copied to clipboard!");
                navigator.clipboard.writeText(window.location.href);
            }
        }

        // Interactive Love Logic
        function moveButton() {
            const btn = document.getElementById('noBtn');
            
            // Generate random position within the entire viewport
            const maxX = window.innerWidth - btn.offsetWidth;
            const maxY = window.innerHeight - btn.offsetHeight;
            
            const x = Math.random() * (maxX - 20) + 10;
            const y = Math.random() * (maxY - 20) + 10;
            
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            btn.style.zIndex = '9999';
        }

        function sayYes() {
            const response = document.getElementById('loveResponse');
            response.innerText = "I knew it! I love you too, Jeevi! ❤️🥰✨";
            
            // Extra confetti for the big Yes!
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ff0000', '#ff69b4', '#ffffff']
            });

            // Reset "No" button position if it moved
            document.getElementById('noBtn').style.position = 'static';
            document.getElementById('noBtn').style.opacity = '0'; // Hide it after Yes
        }
    </script>
</body>
</html>
